apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition

metadata:
  name: apps.mycompany.com

spec:
  group: mycompany.com

  scope: Namespaced

  names:
    plural: apps
    singular: app
    kind: App

  versions:
    - name: v1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec:
              type: object

              properties:

                replicas:
                  type: integer

                image:
                  type: string
